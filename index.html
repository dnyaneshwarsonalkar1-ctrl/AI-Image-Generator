<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8">
  <title>AI Image Finder</title>

  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    *::before, *::after {
      content: none !important;
    }

    body {
      background: radial-gradient(circle at top, rgba(59,130,246,0.12), transparent 24%),
                  radial-gradient(circle at bottom right, rgba(14,165,233,0.08), transparent 18%),
                  #0f172a;
    }

    .glass-card {
      backdrop-filter: blur(20px);
      background: rgba(15, 23, 42, 0.75);
      border: 1px solid rgba(148, 163, 184, 0.18);
    }
  </style>
</head>

<body class="h-full text-slate-100">
  <div class="min-h-screen flex items-center justify-center px-4 py-8">
    <div class="w-full max-w-3xl space-y-8">
      <header class="text-center">
        <h1 class="mt-6 text-4xl font-semibold tracking-tight text-white">AI Image Finder</h1>
      </header>

      <section class="glass-card rounded-3xl border shadow-2xl shadow-slate-950/20 p-8">
        <div class="space-y-5">

          <div class="flex items-center gap-3 mx-auto max-w-2xl">
            <div class="relative flex-1">
              <input id="input"
                oninput="getSuggestions()"
                onkeydown="handleEnter(event)"
                class="w-full rounded-full border border-slate-700 bg-slate-950/80 px-5 py-4 text-lg text-white outline-none ring-1 ring-transparent transition focus:border-sky-400 focus:ring-sky-400/30"
                placeholder="Search images, ideas, or prompts...">

              <button onclick="startVoice()"
                class="absolute right-4 top-1/2 -translate-y-1/2 rounded-full bg-slate-800/90 p-3 text-slate-300 transition hover:bg-slate-700"
                title="Voice search">
                <svg class="h-5 w-5" fill="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                  <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z"/>
                  <path d="M17 16.91c-1.48 1.45-3.76 2.36-6 2.36s-4.51-.91-6-2.36l-1.41 1.41c1.98 1.86 4.76 3.02 7.41 3.02s5.43-1.16 7.41-3.02l-1.41-1.41z"/>
                  <path d="M12 20.59v1.41M8 19h8v1H8z"/>
                </svg>
              </button>
            </div>

            <button onclick="generate()"
              class="rounded-full bg-sky-500 px-7 py-3 text-sm font-medium text-white shadow-lg shadow-sky-500/30 transition hover:bg-sky-400">
              Search
            </button>
          </div>

          <div id="suggestions" class="mx-auto max-w-2xl rounded-3xl border border-slate-700 bg-slate-950/95 text-slate-100 shadow-lg shadow-slate-950/20"></div>
        </div>
      </section>

      <section class="grid gap-6">
        <div id="loading" class="hidden rounded-3xl bg-slate-950/85 px-6 py-4 text-center text-slate-300">⏳ Loading...</div>

        <div id="images" class="grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div>

        <p id="info" class="text-center text-slate-300"></p>
      </section>
    </div>
  </div>

  <script>
    function startVoice() {
      if (!('webkitSpeechRecognition' in window || 'SpeechRecognition' in window)) {
        alert("Use Chrome for voice search");
        return;
      }

      const recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
      recognition.lang = "en-US";
      recognition.start();

      recognition.onresult = function(event) {
        const text = event.results[0][0].transcript;
        document.getElementById("input").value = text;
        generate();
      };

      recognition.onerror = function() {
        alert("Mic permission required");
      };
    }

    function handleEnter(event) {
      if (event.key === "Enter") {
        event.preventDefault();
        document.getElementById("suggestions").innerHTML = "";
        generate();
      }
    }

    async function getSuggestions() {
      const query = document.getElementById("input").value;
      if (!query) {
        document.getElementById("suggestions").innerHTML = "";
        return;
      }

      try {
        const res = await fetch(`https://api.datamuse.com/sug?s=${encodeURIComponent(query)}`);
        const data = await res.json();
        const box = document.getElementById("suggestions");
        box.innerHTML = "";
        data.slice(0,5).forEach(item => {
          const div = document.createElement("div");
          div.innerText = item.word;
          div.className = "cursor-pointer px-5 py-3 text-slate-100 transition hover:bg-slate-800";
          div.onclick = () => {
            document.getElementById("input").value = item.word;
            box.innerHTML = "";
            generate();
          };
          box.appendChild(div);
        });
      } catch {
        document.getElementById("suggestions").innerHTML = "";
      }
    }

    async function generate() {
      const prompt = document.getElementById("input").value.trim();
      if (!prompt) return;

      document.getElementById("loading").classList.remove("hidden");
      document.getElementById("images").innerHTML = "";
      document.getElementById("info").innerText = "";

      try {
        const res = await fetch("https://ai-image-finder.onrender.com/generate", {
          method: "POST",
          headers: {"Content-Type":"application/json"},
          body: JSON.stringify({ prompt })
        });

        const data = await res.json();
        document.getElementById("loading").classList.add("hidden");

        const container = document.getElementById("images");
        if (!data.images || data.images.length === 0) {
          container.innerHTML = "<div class='col-span-full rounded-3xl bg-slate-950/90 px-6 py-8 text-center text-slate-400'>No images found for that prompt.</div>";
        } else {
          data.images.forEach(img => {
            const wrapper = document.createElement("div");
            wrapper.className = "overflow-hidden rounded-3xl bg-slate-950/90 shadow-lg shadow-slate-950/30";
            const image = document.createElement("img");
            image.src = img;
            image.alt = prompt;
            image.className = "h-64 w-full object-cover";
            wrapper.appendChild(image);
            container.appendChild(wrapper);
          });
        }

        document.getElementById("info").innerText = data.info && data.info !== "Error loading data" ? data.info : "";
      } catch {
        document.getElementById("loading").classList.add("hidden");
        document.getElementById("info").innerText = "Error loading data";
      }
    }

  </script>
</body>
</html>
